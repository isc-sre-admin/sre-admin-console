# Contract: retrieve-workspace-directories query
# Proposed query for the frontend to populate the Directory id dropdown on start pipeline pages.
id: retrieve-workspace-directories
label: Retrieve workspace directories
function: Return a list of WorkSpaces directories (e.g. AD Connector directories) in the destination account for use when launching workspaces.
description: |
  Queries the backend for directories available in the destination account. Each
  item includes an id (e.g. d-906603250f) and a label (e.g. testsre.local) for
  the console dropdown.

invocation:
  target: SreQueryFunction
  description: Invoke the SRE query Lambda synchronously; payload includes query and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      query: retrieve-workspace-directories
      destination_account_id: string
    optional: []
  example_python: |
    client = boto3.client("lambda")
    payload = {"query": "retrieve-workspace-directories", "destination_account_id": "<account-id>"}
    response = client.invoke(FunctionName="<SreQueryFunctionArn>", InvocationType="RequestResponse", Payload=json.dumps(payload))
    result = json.loads(response["Payload"].read())
    # result["status"] == "success" -> result["result"]; "error" -> result["error"], result["message"]
  response:
    success: object with status, result (list of {id, label})
    error: object with status, error, message

inputs:
  required:
    - destination_account_id

outputs:
  success:
    list:
      - id
      - label
