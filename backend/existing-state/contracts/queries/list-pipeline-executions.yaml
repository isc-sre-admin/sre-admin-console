# Contract: list-pipeline-executions query
# Proposed query for the frontend to list pipeline executions (active and history).
id: list-pipeline-executions
label: List pipeline executions
function: Return executions for a pipeline (and optionally date range) for the Pipeline activity tables.
description: |
  Queries the backend (e.g. Step Functions ListExecutions or an abstraction over it)
  for executions of a given state machine (pipeline). The frontend uses this to
  populate "Currently executing" and "Execution history" with real data. Supports
  filtering by status (RUNNING, SUCCEEDED, FAILED, etc.) and optional start/end
  date for history.

invocation:
  target: SreQueryFunction
  description: Invoke the SRE query Lambda synchronously; payload includes query and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      query: list-pipeline-executions
      pipeline_id: string
    optional:
      status_filter: string
      start_date: string
      end_date: string
      max_results: integer
  example_python: |
    client = boto3.client("lambda")
    payload = {"query": "list-pipeline-executions", "pipeline_id": "<state-machine-arn>", ...}
    response = client.invoke(FunctionName="<SreQueryFunctionArn>", InvocationType="RequestResponse", Payload=json.dumps(payload))
    result = json.loads(response["Payload"].read())
  response:
    success: object with status, result (list of execution_id, execution_arn, name, status, started_at, stopped_at, enclave_name, label)
    error: object with status, error, message

inputs:
  required:
    - pipeline_id
  optional:
    - status_filter
    - start_date
    - end_date
    - max_results

outputs:
  success:
    list:
      - execution_id
      - execution_arn
      - name
      - status
      - started_at
      - stopped_at
      - enclave_name
      - label
