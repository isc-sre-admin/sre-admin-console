# Contract: retrieve-workspace-running-modes query
# Proposed query for the frontend to populate the Running mode dropdown on start pipeline pages.
id: retrieve-workspace-running-modes
label: Retrieve workspace running modes
function: Return the list of WorkSpace running modes (e.g. for provision-linux-workspace, provision-windows-workspace).
description: |
  Queries the backend for valid running mode values. Each item includes the
  API value (AUTO_STOP, ALWAYS_ON) and a human-readable label for the console
  (e.g. Auto stop, Always on). The frontend renders these as radio buttons.

invocation:
  target: SreQueryFunction
  description: Invoke the SRE query Lambda synchronously; payload includes query (no required inputs).
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      query: retrieve-workspace-running-modes
    optional: []
  example_python: |
    client = boto3.client("lambda")
    payload = {"query": "retrieve-workspace-running-modes"}
    response = client.invoke(FunctionName="<SreQueryFunctionArn>", InvocationType="RequestResponse", Payload=json.dumps(payload))
    result = json.loads(response["Payload"].read())
  response:
    success: object with status, result (list of {value, label})
    error: object with status, error, message

inputs:
  optional: []

outputs:
  success:
    list:
      - value
      - label
