# Contract: launch-workspace operation
id: launch-workspace
label: Launch Workspace
function: Launch WorkSpace in destination account from bundle.
modes:
  verify: Checks that launch can be satisfied (bundle exists, etc.); no launch.
  modify: Launches WorkSpace in destination account from bundle.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: launch-workspace
      mode: verify | modify
      bundle_id: string
      destination_account_id: string
      username: string
      running_mode: string
      encrypt_root_volume: boolean
      encrypt_user_volume: boolean
    optional:
      directory_id: string
      encryption_key_alias: string
      source_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, workspace_id
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - bundle_id
    - destination_account_id
    - username
    - running_mode
    - encrypt_root_volume
    - encrypt_user_volume
  optional:
    - directory_id
    - encryption_key_alias
    - source_region
outputs:
  success:
    - status
    - workspace_id
  error:
    - status
    - error
    - message
