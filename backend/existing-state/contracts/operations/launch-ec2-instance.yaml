# Contract: launch-ec2-instance operation
id: launch-ec2-instance
label: Launch EC2 Instance
function: Launch EC2 instance with AMI, storage, security groups, tags; idempotent by instance_name.
modes:
  verify: When instance_id or instance_name provided, verifies that instance exists. With image_id can find existing instance launched from that AMI.
  modify: Launches instance or returns existing when instance_name matches or same image_id and tag-resource-group. Optionally runs domain join when not skip_domain_join_in_launch.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: launch-ec2-instance
      mode: verify | modify
      instance_type: string
      destination_account_id: string
    optional:
      image_id: string
      ami_id: string
      instance_name: string
      storage_settings: object
      tag-resource-group: string
      subnet_id: string
      subnet_names: array
      security_group_ids: array
      security_groups: array
      keypair_name: string
      key_name: string
      iam_instance_profile_name: string
      domain_join_directory_name: string
      domain_join_username: string
      domain_join_password_secret_name: string
      domain_join_computer_ou: string
      domain_join_use_aws_document: boolean
      skip_domain_join_in_launch: boolean
      ssm_registration_timeout_seconds: integer
      destination_region: string
      source_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, instance_id
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - image_id or ami_id
    - instance_type
    - destination_account_id
  optional:
    - instance_name
    - storage_settings
    - tag-resource-group
    - subnet_id
    - subnet_names
    - security_group_ids
    - security_groups
    - keypair_name
    - key_name
    - iam_instance_profile_name
    - domain_join_directory_name
    - domain_join_username
    - domain_join_password_secret_name
    - domain_join_computer_ou
    - domain_join_use_aws_document
    - skip_domain_join_in_launch
    - ssm_registration_timeout_seconds
    - destination_region
    - source_region
outputs:
  success:
    - status
    - instance_id
  error:
    - status
    - error
    - message
