# Contract: create-radius-shared-secret operation
id: create-radius-shared-secret
label: Create RADIUS Shared Secret
function: Add enclave to radius-secrets JSON with AD Connector node IPs; idempotent. When enclave exists but IPs differ (e.g. AD Connector recreated), updates only that enclave's IPs and keeps existing password.
modes:
  verify: Assumes destination role; gets AD Connector ConnectIps; reads secret; checks enclave with enclave_name exists and IPs match. Returns verified true/false.
  modify: If enclave missing, generates shared secret and appends enclave. If enclave exists and IPs match, no change. If enclave exists and IPs differ, updates only that enclave's radius_servers IPs (password unchanged); other enclaves untouched.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: create-radius-shared-secret
      mode: verify | modify
      destination_account_id: string
      enclave_name: string
      secret_name: string
    optional:
      directory_dns_name: string
      destination_region: string
      source_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, verified, already_exists, ips_updated
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - destination_account_id
    - enclave_name
    - secret_name
  optional:
    - directory_dns_name
    - destination_region
    - source_region
outputs:
  success:
    - status
    - verified
    - already_exists
    - ips_updated
  error:
    - status
    - error
    - message
