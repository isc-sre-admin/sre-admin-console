# Contract: create-radius-shared-secret operation
name: create-radius-shared-secret
function: Add enclave to radius-secrets JSON with AD Connector node IPs; idempotent.
modes:
  verify: Assumes destination role; gets AD Connector ConnectIps; reads secret; checks enclave with enclave_name exists and IPs match. Returns verified true/false.
  modify: Generates shared secret; appends enclave to radius-secrets JSON in source account; updates secret. Idempotent when enclave_name already exists.
inputs:
  required:
    - operation
    - mode
    - destination_account_id
    - enclave_name
    - secret_name
  optional:
    - directory_dns_name
    - destination_region
    - source_region
outputs:
  success:
    - status
    - verified
  error:
    - status
    - error
    - message
