# Contract: create-bundle operation
id: create-bundle
label: Create Bundle
function: Create WorkSpaces bundle from image in destination account.
modes:
  verify: Checks that a bundle for the image exists in destination; no creation.
  modify: Creates bundle from image in destination account.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: create-bundle
      mode: verify | modify
      image_id: string
      destination_account_id: string
      hardware_type: string
      storage_settings: object
    optional:
      source_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, bundle_id
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - image_id
    - destination_account_id
    - hardware_type
    - storage_settings
  optional:
    - source_region
outputs:
  success:
    - status
    - bundle_id
  error:
    - status
    - error
    - message
