# Contract: check-ami-state operation
id: check-ami-state
label: Check AMI State
function: Check whether AMI in destination account is available; used for pipeline polling.
modes:
  default: Read-only. Returns ready true when AMI state is available. No mode parameter.
inputs:
  required:
    - operation
    - ami_id
    - destination_account_id
  optional:
    - destination_region
    - source_region
outputs:
  success:
    - status
    - ready
    - state
  error:
    - status
    - error
    - message
