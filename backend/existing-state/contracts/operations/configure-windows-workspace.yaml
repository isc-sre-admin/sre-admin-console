# Contract: configure-windows-workspace operation
id: configure-windows-workspace
label: Configure Windows Workspace
function: Run PowerShell scripts on Windows WorkSpace via SSM (e.g. RStudio).
modes:
  verify: Uploads scripts and runs wrapper that only downloads and verifies scripts exist on disk; no execution. Returns verified from wrapper output.
  modify: Downloads and executes each PowerShell script in sequence on the node.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: configure-windows-workspace
      mode: verify | modify
      destination_account_id: string
      node_id: string
      node_name: string
      scripts: array
    optional:
      destination_region: string
      source_region: string
      timeout_seconds: integer
      installer_url: string
      installer_urls: array
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, command_id, scripts, verified
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - destination_account_id
    - node_id
    - node_name
    - scripts
  optional:
    - destination_region
    - source_region
    - timeout_seconds
    - installer_url
    - installer_urls
outputs:
  success:
    - status
    - command_id
    - scripts
    - verified
  error:
    - status
    - error
    - message
