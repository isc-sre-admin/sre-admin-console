# Contract: assign-domain-name operation
id: assign-domain-name
label: Assign Domain Name
function: Ensure Route 53 A record (subdomain in source account hosted zone) points to EC2 instance IP in destination account.
modes:
  verify: Checks that A record exists and points to the instance IP; no changes.
  modify: Creates or updates (UPSERT) the A record to point to the instance IP.
inputs:
  required:
    - operation
    - mode
    - destination_account_id
    - subdomain
    - instance_id or instance_name
  optional:
    - destination_region
    - source_region
outputs:
  success:
    - status
  error:
    - status
    - error
    - message
