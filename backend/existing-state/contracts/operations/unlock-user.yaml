# Contract: unlock-user operation (proposed)
# Unlock an AD/WorkSpaces user account so they can sign in again.
id: unlock-user
label: Unlock User
function: Unlock a user account in the directory so the user can sign in.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: unlock-user
      username: string
    optional: []
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, message
    error: object with status, error, message

inputs:
  required:
    - operation
    - username
  optional: []
outputs:
  success:
    - status
    - message
  error:
    - status
    - error
    - message
