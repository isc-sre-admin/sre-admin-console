# Contract: check-ad-connector-state operation
id: check-ad-connector-state
label: Check AD Connector State
function: Return AD Connector directory stage; used to poll until Active.
modes:
  default: Read-only. Returns directory stage (e.g. Creating, Active) and ready true when Active. No mode parameter.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: check-ad-connector-state
      destination_account_id: string
    optional:
      directory_id: string
      directory_dns_name: string
      destination_region: string
      source_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, ready, state, directory_id
    error: object with status, error, message

inputs:
  required:
    - operation
    - destination_account_id
    - directory_id or directory_dns_name
  optional:
    - destination_region
    - source_region
outputs:
  success:
    - status
    - ready
    - state
    - directory_id
  error:
    - status
    - error
    - message
