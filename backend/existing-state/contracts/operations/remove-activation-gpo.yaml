# Contract: remove-activation-gpo operation
id: remove-activation-gpo
label: Remove Activation GPO
function: Unlink and optionally delete GPO from deploy-activation-gpo (backout).
modes:
  verify: Checks state; no unlink or delete.
  modify: Unlinks GPO from OU(s); optionally deletes GPO when delete_gpo true.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: remove-activation-gpo
      mode: verify | modify
      destination_account_id: string
      instance_id: string
    optional:
      gpo_name: string
      ou_path: string
      delete_gpo: boolean
      destination_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, verified
    error: object with status, error, message

inputs:
  required:
    - operation
    - mode
    - destination_account_id
    - instance_id
  optional:
    - gpo_name
    - ou_path
    - delete_gpo
    - destination_region
outputs:
  success:
    - status
    - verified
  error:
    - status
    - error
    - message
