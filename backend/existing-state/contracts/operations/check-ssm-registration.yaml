# Contract: check-ssm-registration operation
id: check-ssm-registration
label: Check SSM Registration
function: Check if node_id is registered and Online in SSM for destination account/region.
modes:
  default: Read-only. Returns ready true when instance is registered and Online. No mode parameter.

invocation:
  target: SreManagementFunction
  description: Invoke the SRE management Lambda synchronously; payload includes operation and inputs below.
  method: lambda.invoke
  invocation_type: RequestResponse
  payload:
    required:
      operation: check-ssm-registration
      node_id: string
      destination_account_id: string
    optional:
      destination_region: string
  example_python: "Same pattern as apply-ansible-playbook: boto3.client('lambda').invoke(FunctionName=<SreManagementFunctionArn>, InvocationType='RequestResponse', Payload=json.dumps(payload))."
  response:
    success: object with status, ready
    error: object with status, error, message

inputs:
  required:
    - operation
    - node_id
    - destination_account_id
  optional:
    - destination_region
outputs:
  success:
    - status
    - ready
  error:
    - status
    - error
    - message
