# Contract: check-bundle-state operation
id: check-bundle-state
label: Check Bundle State
function: Return WorkSpaces bundle state; used for pipeline polling until available.
modes:
  default: Read-only. Returns bundle state and ready when available. No mode parameter.
inputs:
  required:
    - operation
    - bundle_id
    - destination_account_id
  optional:
    - source_region
outputs:
  success:
    - status
    - ready
    - state
  error:
    - status
    - error
    - message
