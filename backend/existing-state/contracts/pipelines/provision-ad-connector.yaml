# Contract: provision-ad-connector pipeline
# Human- and machine-readable summary of name, function, inputs, and outputs.
id: provision-ad-connector
label: Provision AD Connector
function: Deploy AD Connector, RADIUS/MFA, Duo Auth Proxy, register directory, branding, SSM hybrid activation.
modes:
  verify: Each step runs in verify mode where supported; no resources created or changed; validates that AD Connector, RADIUS secret, MFA, directory registration, branding, and activation already exist and match.
  modify: Creates or updates all resources; each component operation is idempotent (security groups, AD Connector, RADIUS secret, playbook, MFA, directory registration, branding, activation).
description: |
  Deploys AD Connector in destination account; optionally creates security groups;
  waits for directory Active; creates RADIUS shared secret; lists Duo Auth Proxy nodes;
  applies duoauthproxy.yaml to node(s); enables RADIUS MFA; registers directory with
  WorkSpaces; configures workspace branding; creates SSM hybrid activation.

invocation:
  target: ProvisionAdConnectorStateMachine
  stack_output_arn: ProvisionAdConnectorStateMachineArn
  description: Start the provision-ad-connector Step Functions state machine; input is the execution input (pipeline inputs below).
  method: stepfunctions.start_execution
  payload:
    required:
      mode: verify | modify
      destination_account_id: string
      enclave_name: string
    optional:
      security_groups: array
      ou_path: string
      source_region: string
      destination_region: string
  example_python: |
    client = boto3.client("stepfunctions")
    arn = "<from stack output ProvisionAdConnectorStateMachineArn>"
    response = client.start_execution(
        stateMachineArn=arn,
        input=json.dumps({"mode": "modify", "destination_account_id": "...", "enclave_name": "..."}),
    )
    execution_arn = response["executionArn"]
  response: start_execution returns executionArn; poll describe_execution for status (RUNNING, SUCCEEDED, FAILED).

inputs:
  required:
    - mode
    - destination_account_id
    - enclave_name
  optional:
    - security_groups
    - ou_path
    - source_region
    - destination_region
  # Other fields filled from config (create_ad_connector_defaults, etc.)

outputs:
  on_success: Pipeline completes with no step failure; directory_id and activation from steps.
  on_failure: Fail state with error/cause from failing step.

component_operations:
  - operation: create-security-group
    when: security_groups present
    inputs: mode, destination_account_id, security_group_name, ingress_rules, egress_rules
    outputs: status, security_group_id
  - operation: create-ad-connector
    inputs: mode, destination_account_id, optional security_group_name
    outputs: directory_id
  - operation: check-ad-connector-state
    inputs: destination_account_id, directory_id
    outputs: ready, state
  - operation: create-radius-shared-secret
    inputs: mode, destination_account_id, enclave_name
    outputs: status
  - operation: list-duo-auth-proxy-nodes
    inputs: destination_account_id
    outputs: node_ids, node_account_id
  - operation: apply-ansible-playbook
    inputs: node_id(s), playbook duoauthproxy.yaml, secret_name, mode
    outputs: status, config_changed
  - operation: get-remaining-node-indices
    inputs: node_ids
    outputs: remaining_indices
  - operation: enable-ad-connector-mfa
    inputs: mode, destination_account_id, enclave_name
    outputs: status
  - operation: register-workspace-directory
    inputs: destination_account_id, directory_id, ou_path, optional security_group
    outputs: status
  - operation: configure-workspace-branding
    inputs: mode, destination_account_id, directory_id
    outputs: status
  - operation: create-ssm-hybrid-activation
    inputs: mode, destination_account_id, iam_role default, instance_limit 10
    outputs: activation_id, instance_name
