<div class="form-check">
  <input type="radio" name="{{ widget.name }}" value="{{ widget.value }}" class="form-check-input"{% if widget.attrs.id %} id="{{ widget.attrs.id }}"{% endif %}{% if widget.selected %} checked{% endif %}>
  <label class="form-check-label"{% if widget.attrs.id %} for="{{ widget.attrs.id }}"{% endif %}>{{ widget.label }}</label>
</div>
