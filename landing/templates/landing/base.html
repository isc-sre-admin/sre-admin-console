{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}SRE Admin Console{% endblock title %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'landing/css/theme.css' %}" />
  </head>
  <body class="app-shell">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header class="border-bottom bg-white">
      <div class="container py-3">
        <a href="{% url 'landing:home' %}" class="header-home-link d-flex align-items-center justify-content-between text-decoration-none text-dark">
          <div>
            <p class="text-uppercase text-secondary small fw-semibold mb-1">AWS Secure Research Enclave</p>
            <h1 class="h4 mb-0">SRE Operations Console</h1>
          </div>
          <span class="badge rounded-pill text-bg-light">Prototype</span>
        </a>
      </div>
    </header>
    <main id="main-content" class="py-4">
      <div class="container">
        {% block content %}{% endblock content %}
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
