<input type="radio" class="btn-check" name="{{ widget.name }}" value="{{ widget.value }}"{% if widget.attrs.id %} id="{{ widget.attrs.id }}"{% endif %}{% if widget.selected %} checked{% endif %} autocomplete="off">
<label class="btn btn-outline-primary"{% if widget.attrs.id %} for="{{ widget.attrs.id }}"{% endif %}>{{ widget.label }}</label>
